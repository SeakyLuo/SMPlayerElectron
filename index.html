<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/app-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>简音播放器</title>
    <script>
      if (new URLSearchParams(window.location.search).get('startupNightMode') === '1') {
        document.documentElement.classList.add('night-mode', 'startup-night-mode')
      }
    </script>
    <style>
      html.startup-night-mode,
      html.startup-night-mode body,
      html.startup-night-mode #root {
        background: #101419;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
